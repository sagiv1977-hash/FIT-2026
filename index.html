<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תכנית אימון ומעקב 2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel (לקמפול ה-JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .animation-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 m-0 p-0">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // יצירת רכיבי האייקונים בצורה שניתן להשתמש בהם ב-React מהספרייה החיצונית
        const Icon = ({ name, ...props }) => {
            const elRef = React.useRef(null);
            React.useEffect(() => {
                if (elRef.current) {
                    elRef.current.innerHTML = '';
                    lucide.createIcons({
                        icons: { [name]: lucide.icons[name] },
                        nameAttr: 'data-lucide',
                        attrs: {
                            class: props.className || '',
                            width: props.size || 24,
                            height: props.size || 24,
                            stroke: props.color || 'currentColor',
                            'stroke-width': props.strokeWidth || 2,
                            'stroke-linecap': 'round',
                            'stroke-linejoin': 'round'
                        }
                    });
                    const svg = elRef.current.children[0];
                    if (svg) {
                        elRef.current.replaceWith(svg);
                    }
                }
            }, [name, props]);
            
            // תגית זמנית שתוחלף ב-SVG אמיתי ע"י הספרייה
            return <i ref={elRef} data-lucide={name}></i>;
        };

        const Calendar = (props) => <Icon name="Calendar" {...props} />;
        const Dumbbell = (props) => <Icon name="Dumbbell" {...props} />;
        const Activity = (props) => <Icon name="Activity" {...props} />;
        const StretchHorizontal = (props) => <Icon name="StretchHorizontal" {...props} />;
        const ExternalLink = (props) => <Icon name="ExternalLink" {...props} />;
        const PlayCircle = (props) => <Icon name="PlayCircle" {...props} />;
        const Menu = (props) => <Icon name="Menu" {...props} />;
        const X = (props) => <Icon name="X" {...props} />;
        const ChevronRight = (props) => <Icon name="ChevronRight" {...props} />;
        const ChevronLeft = (props) => <Icon name="ChevronLeft" {...props} />;
        const Scale = (props) => <Icon name="Scale" {...props} />;
        const Plus = (props) => <Icon name="Plus" {...props} />;
        const HistoryIcon = (props) => <Icon name="History" {...props} />;

        function App() {
            const [activeTab, setActiveTab] = useState('plan');
            const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
            const [currentMonthIndex, setCurrentMonthIndex] = useState(0);
            const [activeRoutineIndex, setActiveRoutineIndex] = useState(0);
            const [expandedWeightTrackers, setExpandedWeightTrackers] = useState({});

            const [trackerState, setTrackerState] = useState(() => {
                const saved = localStorage.getItem('fit2026_tracker');
                return saved ? JSON.parse(saved) : {};
            });

            const [weightLogs, setWeightLogs] = useState(() => {
                const saved = localStorage.getItem('fit2026_weights');
                return saved ? JSON.parse(saved) : {};
            });

            useEffect(() => {
                localStorage.setItem('fit2026_tracker', JSON.stringify(trackerState));
            }, [trackerState]);

            useEffect(() => {
                localStorage.setItem('fit2026_weights', JSON.stringify(weightLogs));
            }, [weightLogs]);

            const months = [
                { year: 2026, month: 4, name: "מאי 2026" },
                { year: 2026, month: 5, name: "יוני 2026" },
                { year: 2026, month: 6, name: "יולי 2026" },
                { year: 2026, month: 7, name: "אוגוסט 2026" },
                { year: 2026, month: 8, name: "ספטמבר 2026" },
                { year: 2026, month: 9, name: "אוקטובר 2026" }
            ];

            const toggleDay = (dateStr) => {
                setTrackerState(prev => ({ ...prev, [dateStr]: !prev[dateStr] }));
            };

            const toggleWeightTracker = (exId) => {
                setExpandedWeightTrackers(prev => ({ ...prev, [exId]: !prev[exId] }));
            };

            const handleAddWeightLog = (exId, date, weight) => {
                if (!weight) return;
                setWeightLogs(prev => {
                    const currentLogs = prev[exId] || [];
                    const newLogs = [...currentLogs, { date, weight: parseFloat(weight) }];
                    newLogs.sort((a, b) => new Date(b.date) - new Date(a.date));
                    return { ...prev, [exId]: newLogs };
                });
            };

            const WeightTrackerComponent = ({ exId }) => {
                const [dateInput, setDateInput] = useState(new Date().toISOString().split('T')[0]);
                const [weightInput, setWeightInput] = useState('');
                const logs = weightLogs[exId] || [];

                return (
                    <div className="mt-4 bg-slate-50 border border-slate-200 rounded-xl p-4 animation-fade-in">
                        <h4 className="font-bold text-slate-700 text-sm mb-3 flex items-center gap-2">
                            <HistoryIcon size={16} /> טבלת מעקב משקלים
                        </h4>
                        
                        <div className="flex gap-2 mb-4">
                            <input 
                                type="date" 
                                value={dateInput}
                                onChange={(e) => setDateInput(e.target.value)}
                                className="flex-1 px-3 py-2 text-sm rounded-lg border border-slate-300 focus:outline-none focus:border-blue-500 bg-white"
                            />
                            <input 
                                type="number" 
                                step="0.5"
                                placeholder="ק״ג" 
                                value={weightInput}
                                onChange={(e) => setWeightInput(e.target.value)}
                                className="w-20 px-3 py-2 text-sm rounded-lg border border-slate-300 focus:outline-none focus:border-blue-500 bg-white text-center"
                                dir="ltr"
                            />
                            <button 
                                onClick={() => {
                                    handleAddWeightLog(exId, dateInput, weightInput);
                                    setWeightInput('');
                                }}
                                className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg flex items-center justify-center transition-colors"
                            >
                                <Plus size={18} />
                            </button>
                        </div>

                        {logs.length > 0 ? (
                            <div className="max-h-32 overflow-y-auto pr-1 custom-scrollbar">
                                <table className="w-full text-sm text-right">
                                    <thead className="text-slate-500 sticky top-0 bg-slate-50">
                                        <tr>
                                            <th className="py-1 font-medium border-b border-slate-200">תאריך</th>
                                            <th className="py-1 font-medium border-b border-slate-200">משקל</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {logs.map((log, i) => (
                                            <tr key={i} className="border-b border-slate-100 last:border-0">
                                                <td className="py-2 text-slate-700">{new Date(log.date).toLocaleDateString('he-IL')}</td>
                                                <td className="py-2 font-bold text-blue-600" dir="ltr">{log.weight} kg</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        ) : (
                            <p className="text-xs text-slate-400 text-center py-2">אין נתונים עדיין. תעד משקלים כדי לראות התקדמות!</p>
                        )}
                    </div>
                );

                    exercises: [
                        { id: "st1", name: "1. מתיחת חזה במשקוף", desc: "הנחת אמות על משקוף דלת והישענות קלה קדימה.", duration: "30 שניות", img: "https://images.unsplash.com/photo-1552674605-db6ffd4facb5?auto=format&fit=crop&w=300&q=80", link: "https://www.youtube.com/results?search_query=doorway+chest+stretch" },
                        { id: "st2", name: "2. מתיחת כתף בהצלבה", desc: "העברת יד ישרה מעבר לחזה ומשיכתה פנימה.", duration: "30 שנ' לצד", img: "https://images.unsplash.com/photo-1599058917212-d750089bc07e?auto=format&fit=crop&w=300&q=80", link: "https://www.youtube.com/results?search_query=cross+body+shoulder+stretch" },
                        { id: "st3", name: "3. מתיחת תלת ראשי מעל הראש", desc: "כפיפת מרפק אל מאחורי העורף ומשיכה עם יד שניה.", duration: "30 שנ' לצד", img: "https://images.unsplash.com/photo-1518611012118-696072aa579a?auto=format&fit=crop&w=300&q=80", link: "https://www.youtube.com/results?search_query=overhead+triceps+stretch" },
                        { id: "st4", name: "4. מתיחת צוואר עדינה", desc: "הטיית הראש הצידה אל כיוון הכתף, כתפיים למטה.", duration: "20 שנ' לצד", img: "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&w=300&q=80", link: "https://www.youtube.com/results?search_query=gentle+neck+stretch" },
                        { id: "st5", name: "5. תנוחת העובר", desc: "ישיבה על העקבים, ידיים קדימה והורדת הראש.", duration: "45 שניות", img: "https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&w=300&q=80", link: "https://www.youtube.com/results?search_query=childs+pose+stretch" },
                        { id: "st6", name: "6. מתיחת ארבע ראשי עמידה", desc: "תפיסת קרסול ומשיכת העקב לישבן (להחזיק קיר לאיזון).", duration: "30 שנ' לצד", img: "https://images.unsplash.com/photo-1588286840104-b43b67e0e7a2?auto=format&fit=crop&w=300&q=80", link: "https://www.youtube.com/results?search_query=standing+quad+stretch" },
                        { id: "st7", name: "7. מתיחת המסטרינג ישיבה", desc: "ישיבה, רגל ישרה ורגל כפופה, רכינה לפנים לאצבעות.", duration: "30 שנ' לרגל", img: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=300&q=80", link: "https://www.youtube.com/results?search_query=seated+hamstring+stretch" },
                        { id: "st8", name: "8. מתיחת שוקיים על קיר", desc: "ידיים על קיר, רגל לאחור ישרה עקב צמוד לרצפה.", duration: "30 שנ' לצד", img: "https://images.unsplash.com/photo-1574680096145-d05b474e2155?auto=format&fit=crop&w=300&q=80", link: "https://www.youtube.com/results?search_query=wall+calf+stretch" },
                        { id: "st9", name: "9. מתיחת ישבן צורת 4", desc: "שכיבה, קרסול ימין על ברך שמאל, משיכת ירך לחזה.", duration: "30 שנ' לצד", img: "https://images.unsplash.com/photo-1517130038641-a774d04afb3c?auto=format&fit=crop&w=300&q=80", link: "https://www.youtube.com/results?search_query=figure+4+stretch" },
                        { id: "st10", name: "10. מתיחת כופפי ירך בכריעה", desc: "ברך על הרצפה, רגל שניה ב-90 מעלות, דחיפת אגן קדימה.", duration: "30 שנ' לצד", img: "https://images.unsplash.com/photo-1574680088814-c9e8a10d8a4d?auto=format&fit=crop&w=300&q=80", link: "https://www.youtube.com/results?search_query=kneeling+hip+flexor+stretch" }
                    ]
                }
            };

            const renderCalendar = (monthInfo) => {
                const { year, month, name } = monthInfo;
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const firstDay = new Date(year, month, 1).getDay();
                const daysArray = Array.from({ length: daysInMonth }, (_, i) => i + 1);
                const blanks = Array.from({ length: firstDay }, (_, i) => i);
                const weekDays = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'];

                return (
                    <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 sm:p-6 w-full max-w-md mx-auto">
                        <h3 className="text-xl font-bold text-center text-slate-800 mb-6">{name}</h3>
                        <div className="grid grid-cols-7 gap-2 mb-2 text-center text-slate-400 font-medium text-sm">
                            {weekDays.map(day => <div key={day}>{day}</div>)}
                        </div>
                        <div className="grid grid-cols-7 gap-2 sm:gap-3">
                            {blanks.map(blank => <div key={`blank-${blank}`} className="p-2"></div>)}
                            {daysArray.map(day => {
                                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                const isCompleted = trackerState[dateStr];
                                return (
                                    <button
                                        key={dateStr}
                                        onClick={() => toggleDay(dateStr)}
                                        className={`aspect-square rounded-xl flex items-center justify-center font-bold text-sm transition-all duration-200 ${isCompleted ? 'bg-blue-600 text-white shadow-md shadow-blue-200 scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-100'}`}
                                    >
                                        {day}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                );
            };

            const renderExerciseList = (exercises, isStrength = false) => (
                <div className="p-4 sm:p-6 grid grid-cols-1 md:grid-cols-2 gap-6">
                    {exercises.map((ex) => (
                        <div key={ex.id} className="group flex flex-col gap-4 p-4 rounded-2xl border border-slate-100 shadow-sm hover:border-blue-200 hover:shadow-md transition-all bg-white relative">
                            
                            <div className="flex flex-col sm:flex-row gap-4">
                                <div className="w-full sm:w-32 h-40 sm:h-28 flex-shrink-0 rounded-xl overflow-hidden bg-slate-100 relative">
                                    <img src={ex.img} alt={ex.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                    <a href={ex.link} target="_blank" rel="noreferrer" className="absolute inset-0 bg-black/30 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                        <PlayCircle className="text-white" size={40} />
                                    </a>
                                </div>
                                <div className="flex-1 flex flex-col">
                                    {isStrength && ex.targetHe && (
                                        <div className="mb-2">
                                            <span className="inline-block bg-indigo-50 text-indigo-700 text-[10px] font-bold px-2 py-1 rounded-md border border-indigo-100">
                                                שריר: {ex.targetHe} | <span className="font-sans" dir="ltr">{ex.targetEn}</span>
                                            </span>
                                        </div>
                                    )}
                                    <h3 className="font-bold text-slate-800 text-base mb-1">{ex.name}</h3>
                                    <p className="text-slate-500 text-sm mb-3 leading-relaxed">{ex.desc}</p>
                                    <div className="mt-auto flex items-center justify-between">
                                        <span className="text-blue-600 font-bold text-sm bg-blue-50 px-3 py-1 rounded-lg">
                                            {ex.duration}
                                        </span>
                                        <div className="flex gap-2">
                                            {isStrength && (
                                                <button 
                                                    onClick={() => toggleWeightTracker(ex.id)}
                                                    className={`flex items-center gap-1 text-sm font-bold px-2 py-1 rounded-md transition-colors ${expandedWeightTrackers[ex.id] ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}
                                                >
                                                    <Scale size={14} /> משקלים
                                                </button>
                                            )}
                                            <a href={ex.link} target="_blank" rel="noreferrer" className="text-slate-400 hover:text-blue-600 flex items-center justify-center bg-slate-50 w-8 h-8 rounded-full transition-colors">
                                                <ExternalLink size={16} />
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {isStrength && expandedWeightTrackers[ex.id] && (
                                <WeightTrackerComponent exId={ex.id} />
                            )}

                        </div>
                    ))}
                </div>
            );

            return (
                <div>
                    <nav className="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
                        <div className="max-w-5xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-2">
                                <div className="bg-blue-600 text-white p-1.5 rounded-lg"><Activity size={24} /></div>
                                <span className="font-black text-xl tracking-tight text-slate-800">Fit<span className="text-blue-600">2026</span></span>
                            </div>
                            <div className="hidden sm:flex gap-1 bg-slate-100 p-1 rounded-xl">
                                <button onClick={() => setActiveTab('plan')} className={`px-6 py-2 rounded-lg font-bold text-sm transition-all ${activeTab === 'plan' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>תכנית אימון</button>
                                <button onClick={() => setActiveTab('tracker')} className={`px-6 py-2 rounded-lg font-bold text-sm transition-all ${activeTab === 'tracker' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500 hover:text-slate-800'}`}>מעקב חודשי</button>
                            </div>
                            <button className="sm:hidden text-slate-600" onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}>
                                {isMobileMenuOpen ? <X size={28} /> : <Menu size={28} />}
                            </button>
                        </div>
                        {isMobileMenuOpen && (
                            <div className="sm:hidden bg-white border-t border-gray-100 absolute w-full left-0 px-4 py-3 flex flex-col gap-2 shadow-lg">
                                <button onClick={() => { setActiveTab('plan'); setIsMobileMenuOpen(false); }} className={`p-3 text-right rounded-xl font-bold flex items-center gap-3 ${activeTab === 'plan' ? 'bg-blue-50 text-blue-700' : 'text-slate-600'}`}><Dumbbell size={20} /> תכנית אימון</button>
                                <button onClick={() => { setActiveTab('tracker'); setIsMobileMenuOpen(false); }} className={`p-3 text-right rounded-xl font-bold flex items-center gap-3 ${activeTab === 'tracker' ? 'bg-blue-50 text-blue-700' : 'text-slate-600'}`}><Calendar size={20} /> מעקב חודשי</button>
                            </div>
                        )}
                    </nav>

                    <main className="max-w-5xl mx-auto px-4 sm:px-6 py-8 pb-20">
                        
                        {activeTab === 'plan' && (
                            <div className="space-y-10 animation-fade-in">
                                <header className="mb-8 text-center sm:text-right">
                                    <h1 className="text-3xl font-black text-slate-800 mb-2">תכנית אימון מלאה</h1>
                                    <p className="text-slate-500 font-medium">אימון ממוקד של כשעה | מותאם לגיל 28 | רמת ביניים</p>
                                </header>

                                {Object.values(workoutPlan).map((section) => (
                                    <section key={section.id} className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
                                        <div className="bg-slate-50 border-b border-slate-200 px-6 py-4 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                            <div className="flex items-center gap-3">
                                                {section.icon}
                                                <h2 className="text-xl font-bold text-slate-800">{section.title}</h2>
                                            </div>
                                            
                                            {section.id === 'strength' && (
                                                <div className="flex bg-slate-200 p-1 rounded-lg w-full sm:w-auto">
                                                    {section.routines.map((routine, idx) => (
                                                        <button 
                                                            key={idx}
                                                            onClick={() => setActiveRoutineIndex(idx)}
                                                            className={`flex-1 sm:flex-none px-4 py-1.5 rounded-md text-sm font-bold transition-all ${activeRoutineIndex === idx ? 'bg-white text-orange-600 shadow-sm' : 'text-slate-600 hover:text-slate-800'}`}
                                                        >
                                                            {routine.name.split(' ')[1]} {routine.name.split(' ')[0]}
                                                            <span className="hidden sm:inline"> - {routine.name}</span>
                                                            <span className="sm:hidden">{idx === 0 ? "תוכנית א'" : "תוכנית ב'"}</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                        
                                        {section.id === 'strength' 
                                            ? renderExerciseList(section.routines[activeRoutineIndex].exercises, true)
                                            : renderExerciseList(section.exercises, false)
                                        }
                                    </section>
                                ))}
                            </div>
                        )}

                        {activeTab === 'tracker' && (
                            <div className="animation-fade-in flex flex-col items-center">
                                <header className="mb-10 text-center">
                                    <h1 className="text-3xl font-black text-slate-800 mb-2">מעקב התמדה אישי</h1>
                                    <p className="text-slate-500 font-medium max-w-md mx-auto">לחץ על כל יום שבו השלמת את האימון במלואו.</p>
                                </header>

                                <div className="flex items-center justify-between w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-100 p-2 mb-6">
                                    <button onClick={() => setCurrentMonthIndex(Math.min(months.length - 1, currentMonthIndex + 1))} disabled={currentMonthIndex === months.length - 1} className="p-3 text-slate-400 hover:text-blue-600 disabled:opacity-30"><ChevronRight size={24} /></button>
                                    <div className="flex flex-col items-center">
                                        <span className="text-xs font-bold tracking-widest text-blue-500 uppercase">חודש {currentMonthIndex + 1} מתוך 6</span>
                                        <span className="text-lg font-black text-slate-800">{months[currentMonthIndex].name}</span>
                                    </div>
                                    <button onClick={() => setCurrentMonthIndex(Math.max(0, currentMonthIndex - 1))} disabled={currentMonthIndex === 0} className="p-3 text-slate-400 hover:text-blue-600 disabled:opacity-30"><ChevronLeft size={24} /></button>
                                </div>

                                {renderCalendar(months[currentMonthIndex])}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
