<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>תכנית אימון ומעקב 2026</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body, html {
            overscroll-behavior-y: none;
        }
        .animation-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        /* פס גלילה מותאם אישית שיהיה גלוי תמיד גם בדסקטופ */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-900 m-0 p-0 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        const Icon = ({ name, size = 24, color = 'currentColor', strokeWidth = 2, className = '' }) => {
            const elRef = React.useRef(null);
            React.useEffect(() => {
                if (elRef.current && lucide.icons[name]) {
                    const icon = lucide.icons[name];
                    const svgElement = lucide.createElement(icon);
                    svgElement.setAttribute('width', size);
                    svgElement.setAttribute('height', size);
                    svgElement.setAttribute('stroke', color);
                    svgElement.setAttribute('stroke-width', strokeWidth);
                    if (className) svgElement.setAttribute('class', className);
                    
                    elRef.current.innerHTML = '';
                    elRef.current.appendChild(svgElement);
                }
            }, [name, size, color, strokeWidth, className]);
            
            return <span ref={elRef} className="inline-flex items-center justify-center"></span>;
        };

        const Calendar = (props) => <Icon name="Calendar" {...props} />;
        const Dumbbell = (props) => <Icon name="Dumbbell" {...props} />;
        const Activity = (props) => <Icon name="Activity" {...props} />;
        const StretchHorizontal = (props) => <Icon name="StretchHorizontal" {...props} />;
        const PlayCircle = (props) => <Icon name="PlayCircle" {...props} />;
        const ChevronRight = (props) => <Icon name="ChevronRight" {...props} />;
        const ChevronLeft = (props) => <Icon name="ChevronLeft" {...props} />;
        const ArrowRight = (props) => <Icon name="ArrowRight" {...props} />;
        const Plus = (props) => <Icon name="Plus" {...props} />;
        const HistoryIcon = (props) => <Icon name="History" {...props} />;
        const Target = (props) => <Icon name="Target" {...props} />;
        const AlertTriangle = (props) => <Icon name="AlertTriangle" {...props} />;
        const Eye = (props) => <Icon name="Eye" {...props} />;
        const X = (props) => <Icon name="X" {...props} />;

        const WeightTrackerComponent = ({ exId, weightLogs, onAddLog, onDeleteLog }) => {
            const [dateInput, setDateInput] = useState(new Date().toISOString().split('T')[0]);
            const [weightInput, setWeightInput] = useState('');
            const logs = weightLogs[exId] || [];

            const handleAdd = () => {
                if (!weightInput) return;
                onAddLog(exId, dateInput, weightInput);
                setWeightInput('');
            };

            return (
                <div className="flex flex-col w-full gap-3 pt-2 pb-4">
                    <div className="flex items-center gap-2 w-full">
                        <input 
                            type="date" 
                            value={dateInput}
                            onChange={(e) => setDateInput(e.target.value)}
                            className="flex-1 px-3 py-3 text-sm font-medium rounded-xl border border-slate-300 focus:outline-none focus:border-blue-500 bg-white shadow-sm"
                        />
                        <input 
                            type="number" 
                            step="0.5"
                            placeholder="משקל" 
                            value={weightInput}
                            onChange={(e) => setWeightInput(e.target.value)}
                            className="w-[100px] px-2 py-3 text-sm font-bold rounded-xl border border-slate-300 focus:outline-none focus:border-blue-500 bg-white text-center shadow-sm"
                            dir="ltr"
                        />
                        <button 
                            type="button"
                            onClick={handleAdd}
                            className="bg-slate-800 hover:bg-slate-900 text-white px-4 py-3 rounded-xl flex items-center justify-center transition-colors shrink-0 shadow-md font-bold"
                        >
                            <Plus size={20} />
                        </button>
                    </div>

                    {logs.length > 0 && (
                        <div className="bg-white border border-slate-200 rounded-xl p-3 shadow-inner mt-1">
                            <h4 className="font-bold text-slate-700 text-xs mb-2 flex items-center gap-1.5">
                                <HistoryIcon size={14} /> היסטוריית משקלים
                            </h4>
                            
                            <div className="max-h-32 overflow-y-auto pr-1 custom-scrollbar mb-3">
                                <table className="w-full text-sm text-right">
                                    <tbody>
                                        {logs.map((log, i) => (
                                            <tr key={i} className="border-b border-slate-50 last:border-0">
                                                <td className="py-1.5 text-slate-600">{new Date(log.date).toLocaleDateString('he-IL')}</td>
                                                <td className="py-1.5 font-black text-blue-700 text-center" dir="ltr">{log.weight} kg</td>
                                                <td className="py-1.5 text-left">
                                                    <button 
                                                        onClick={() => onDeleteLog(exId, i)}
                                                        className="text-red-400 hover:text-red-600 p-1 transition-colors"
                                                    >
                                                        <X size={16} strokeWidth={3} />
                                                    </button>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            
                            {(() => {
                                const latestLog = logs[0];
                                if (!latestLog || isNaN(latestLog.weight)) return null;
                                
                                const nextDate = new Date(new Date(latestLog.date).getTime() + 21 * 24 * 60 * 60 * 1000);
                                const nextWeight = (latestLog.weight + 1.25).toFixed(2);
                                
                                return (
                                    <div className="bg-orange-50 border border-orange-200 rounded-lg p-3 mt-2">
                                        <div className="flex items-center gap-1.5 text-orange-800 font-black mb-1 text-xs">
                                            <Target size={14} /> יעד לאימון הבא:
                                        </div>
                                        <div className="text-orange-900 font-bold text-lg mb-2 flex items-center gap-2">
                                            <span>{nextDate.toLocaleDateString('he-IL')}</span>
                                            <span className="text-orange-300">|</span>
                                            <span dir="ltr">{parseFloat(nextWeight)} kg</span>
                                        </div>
                                        <div className="flex items-start gap-2 text-xs text-orange-800 bg-white p-2 rounded-md leading-tight shadow-sm border border-orange-100">
                                            <AlertTriangle size={20} className="shrink-0 text-orange-500 mt-0.5" />
                                            <span><strong>אזהרה:</strong> לעלות משקל רק אם מרגישים בטוחים והטכניקה מושלמת!</span>
                                        </div>
                                    </div>
                                );
                            })()}
                        </div>
                    )}
                </div>
            );
        };

        const MomDashboard = ({ trackerState, weightLogs, onClose, routines }) => {
            const currentMonth = new Date().getMonth() + 1;
            const currentYear = new Date().getFullYear();
            
            const workoutsThisMonth = useMemo(() => {
                return Object.keys(trackerState).filter(date => {
                    const [y, m] = date.split('-');
                    return parseInt(y) === currentYear && parseInt(m) === currentMonth && trackerState[date];
                }).length;
            }, [trackerState]);

            const allExercises = routines.flatMap(r => r.exercises);

            return (
                <div className="fixed inset-0 bg-slate-900/95 z-[100] flex items-center justify-center p-4 animation-fade-in overflow-y-auto">
                    <div className="bg-white w-full max-w-md rounded-3xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                        <div className="bg-slate-800 p-6 text-white flex justify-between items-center">
                            <div>
                                <h2 className="text-xl font-black flex items-center gap-2">
                                    <Eye size={24} className="text-blue-400" />
                                    מרכז בקרה דיסקרטי
                                </h2>
                                <p className="text-slate-400 text-xs">סיכום התקדמות ונתונים בזמן אמת</p>
                            </div>
                            <button onClick={onClose} className="bg-slate-700 p-2 rounded-full hover:bg-slate-600 transition-colors">
                                <X size={20} />
                            </button>
                        </div>

                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-6">
                            <div className="bg-blue-50 border border-blue-100 rounded-2xl p-4 flex items-center gap-4">
                                <div className="bg-blue-600 text-white p-3 rounded-xl">
                                    <Calendar size={28} />
                                </div>
                                <div>
                                    <p className="text-blue-600 text-xs font-bold uppercase tracking-wider">התמדה החודש</p>
                                    <p className="text-2xl font-black text-slate-800">{workoutsThisMonth} אימונים</p>
                                </div>
                            </div>

                            <div className="space-y-3">
                                <h3 className="font-black text-slate-800 flex items-center gap-2 text-sm border-b pb-2 border-slate-100">
                                    <Dumbbell size={18} className="text-orange-500" />
                                    סטטוס משקלים נוכחי
                                </h3>
                                <div className="space-y-2">
                                    {allExercises.map(ex => {
                                        const logs = weightLogs[ex.id] || [];
                                        const lastWeight = logs.length > 0 ? logs[0].weight : null;
                                        
                                        return (
                                            <div key={ex.id} className="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                                                <div className="flex flex-col">
                                                    <span className="text-xs font-bold text-slate-800">{ex.name}</span>
                                                    <span className="text-[10px] text-slate-400">{ex.targetHe}</span>
                                                </div>
                                                <div className="text-right">
                                                    {lastWeight ? (
                                                        <span className="text-sm font-black text-blue-600" dir="ltr">{lastWeight} kg</span>
                                                    ) : (
                                                        <span className="text-[10px] text-slate-300">טרם הוזן</span>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        <div className="p-4 bg-slate-50 text-center border-t border-slate-100">
                            <button onClick={onClose} className="text-slate-400 text-xs hover:text-slate-600 font-bold">סגור תצוגה נסתרת</button>
                        </div>
                    </div>
                </div>
            );
        };

                const saved = localStorage.getItem('fit2026_tracker');
                return saved ? JSON.parse(saved) : {};
            });

                const saved = localStorage.getItem('fit2026_weights');
                return saved ? JSON.parse(saved) : {};
            });

            useEffect(() => { localStorage.setItem('fit2026_weights', JSON.stringify(weightLogs)); }, [weightLogs]);

                if (momClicks > 0) {
                    const timer = setTimeout(() => setMomClicks(0), 3000);
                    return () => clearTimeout(timer);
                }

                const nextCount = momClicks + 1;
                if (nextCount >= 5) {
                    setShowMomDashboard(true);
                    setMomClicks(0);

                    setMomClicks(nextCount);

                                { id: "s2_5", targetHe: "חלק עליון (גב)", targetEn: "Upper Body", name: "חתירה יד-יד", desc: "משיכת משקולת ביד אחת.", duration: "3 סטים | 10 לכל יד", img: "https://images.unsplash.com/photo-1598289431512-b97b0917affc?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=single+arm+dumbbell+row" },
                                { id: "s2_6", targetHe: "בטן", targetEn: "Core", name: "רושן טוויסט", desc: "ישיבה, סיבוב הגו מצד לצד.", duration: "3 סטים | 20 חזרות", img: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=russian+twist" },
                                { id: "s2_7", targetHe: "חלק תחתון", targetEn: "Lower Body", name: "סקוואט סטטי (Wall Sit)", desc: "ישיבה באוויר כשהגב נשען על קיר.", duration: "3 סטים | 45 שניות", img: "https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=wall+sit" },
                                { id: "s2_8", targetHe: "חלק עליון (כתפיים)", targetEn: "Upper Body", name: "הרחקת כתפיים", desc: "הרמת משקולות קלות לצדדים.", duration: "3 סטים | 12 חזרות", img: "https://images.unsplash.com/photo-1581009137042-c552e48ce528?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=dumbbell+lateral+raises" },
                                { id: "s2_9", targetHe: "בטן", targetEn: "Core", name: "פלאנק עם נגיעה בכתף", desc: "מצב פלאנק גבוה, נגיעה בכתף נגדית.", duration: "3 סטים | 20 נגיעות", img: "https://images.unsplash.com/photo-1566241440091-ec10de8db2e1?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=plank+shoulder+taps" },
                                { id: "s2_10", targetHe: "חלק תחתון", targetEn: "Lower Body", name: "הרחקת ירך בשכיבה", desc: "שכיבה על הצד והרמת הרגל העליונה.", duration: "3 סטים | 15 לכל רגל", img: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=lying+hip+abduction" },
                                { id: "s2_11", targetHe: "חלק עליון (ידיים)", targetEn: "Upper Body", name: "מקבילים על כיסא", desc: "הישענות לאחור על כיסא וכפיפת מרפקים.", duration: "3 סטים | 10 חזרות", img: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=bench+dips" },
                                { id: "s2_12", targetHe: "בטן", targetEn: "Core", name: "אופניים (Bicycle Crunches)", desc: "קירוב מרפק לברך נגדית בשכיבה.", duration: "3 סטים | 20 חזרות", img: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=bicycle+crunches" }
                            ]
                        }
                    ]
                },
                stretching: {
                    id: 'stretching',
                    exercises: [
                        { id: "st1", name: "1. מתיחת חזה במשקוף", desc: "הנחת אמות על משקוף דלת והישענות קדימה.", duration: "30 שניות", img: "https://images.unsplash.com/photo-1552674605-db6ffd4facb5?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=doorway+chest+stretch" },
                        { id: "st5", name: "5. תנוחת העובר", desc: "ישיבה על העקבים, ידיים קדימה והורדת הראש.", duration: "45 שניות", img: "https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=childs+pose+stretch" }
                    ]
                }
            };

            const startWorkout = (view) => {
                setCurrentExIndex(0);
                setCurrentView(view);
            };

            const handleBackToHome = () => {
                setCurrentView('home');
                setCurrentExIndex(0);
            };

            const toggleDay = (dateStr) => {
                setTrackerState(prev => ({ ...prev, [dateStr]: !prev[dateStr] }));
            };

            const handleAddWeightLog = (exId, date, weight) => {
                if (!weight) return;
                setWeightLogs(prev => {
                    const currentLogs = prev[exId] || [];
                    const newLogs = [{ date, weight: parseFloat(weight) }, ...currentLogs];
                    newLogs.sort((a, b) => new Date(b.date) - new Date(a.date));
                    return { ...prev, [exId]: newLogs };
                });
            };

            const handleDeleteWeightLog = (exId, index) => {
                setWeightLogs(prev => {
                    const currentLogs = prev[exId] || [];
                    const newLogs = currentLogs.filter((_, i) => i !== index);
                    return { ...prev, [exId]: newLogs };
                });
            };

            const renderHomeMenu = () => (
                <div className="max-w-md mx-auto p-4 space-y-4 animation-fade-in pb-20">
                    <header className="mb-6 mt-2 text-center">
                        <h1 className="text-3xl font-black text-slate-800 mb-1">אימון 2026</h1>
                        <p className="text-slate-500 font-medium italic">"התקדמות היא לא מקרה, היא החלטה"</p>
                    </header>

                    <button type="button" onClick={() => startWorkout('cardio')} className="w-full bg-white p-5 rounded-3xl shadow-sm border border-slate-100 hover:border-blue-300 transition-all flex items-center gap-4 text-right">
                        <div className="bg-blue-50 p-4 rounded-2xl text-blue-500"><Activity size={32}/></div>
                        <div className="flex-1">
                            <h2 className="text-lg font-bold text-slate-800">אירובי</h2>
                            <p className="text-sm text-slate-500">20 דק' • 3 שלבים</p>
                        </div>
                        <ChevronLeft className="text-slate-300" />
                    </button>

                    <div className="w-full bg-white p-5 rounded-3xl shadow-sm border border-slate-100 hover:border-orange-300 transition-all flex flex-col gap-4">
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => startWorkout('strength')}>
                            <div className="bg-orange-50 p-4 rounded-2xl text-orange-500"><Dumbbell size={32}/></div>
                            <div className="flex-1 text-right">
                                <h2 className="text-lg font-bold text-slate-800">אימון כוח</h2>
                                <p className="text-sm text-slate-500">40 דק' • סבבים שלמים</p>
                            </div>
                            <ChevronLeft className="text-slate-300" />
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-xl w-full">
                            {workoutPlan.strength.routines.map((r, idx) => (
                                <button type="button" key={idx} onClick={(e) => { e.stopPropagation(); setActiveRoutineIndex(idx); }} className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition-all ${activeRoutineIndex === idx ? 'bg-white text-orange-600 shadow-sm' : 'text-slate-500'}`}>
                                    {r.name.split(' ')[0]} {r.name.split(' ')[1]}
                                </button>
                            ))}
                        </div>
                        <button type="button" onClick={() => startWorkout('strength')} className="w-full bg-orange-100 text-orange-700 font-bold py-3 rounded-xl hover:bg-orange-200 transition-colors">
                            התחל אימון
                        </button>
                    </div>

                    <button type="button" onClick={() => startWorkout('stretching')} className="w-full bg-white p-5 rounded-3xl shadow-sm border border-slate-100 hover:border-green-300 transition-all flex items-center gap-4 text-right">
                        <div className="bg-green-50 p-4 rounded-2xl text-green-500"><StretchHorizontal size={32}/></div>
                        <div className="flex-1">
                            <h2 className="text-lg font-bold text-slate-800">מתיחות</h2>
                            <p className="text-sm text-slate-500">10 דק' • שחרור</p>
                        </div>
                        <ChevronLeft className="text-slate-300" />
                    </button>

                    <button type="button" onClick={() => setCurrentView('tracker')} className="w-full bg-slate-800 p-5 rounded-3xl shadow-md border border-slate-700 hover:bg-slate-700 transition-all flex items-center gap-4 text-right text-white mt-8">
                        <div className="bg-slate-700 p-4 rounded-2xl text-purple-400"><Calendar size={32}/></div>
                        <div className="flex-1">
                            <h2 className="text-lg font-bold">מעקב התמדה</h2>
                            <p className="text-sm text-slate-400">היומן האישי שלי</p>
                        </div>
                        <ChevronLeft className="text-slate-500" />
                    </button>
                </div>
            );

            const renderExerciseSlider = () => {
                let exercises = [];
                let isStrength = false;

                if (currentView === 'cardio') exercises = workoutPlan.cardio.exercises;
                if (currentView === 'stretching') exercises = workoutPlan.stretching.exercises;
                if (currentView === 'strength') {
                    exercises = workoutPlan.strength.routines[activeRoutineIndex].exercises;
                    isStrength = true;
                }

                return (
                    <div className="flex flex-col h-[calc(100vh-4rem)] bg-slate-50 overflow-hidden animation-fade-in">
                        <div className="px-4 py-3 bg-white border-b border-slate-200 flex justify-between items-center z-10 shrink-0 shadow-sm">
                            <span className="font-bold text-slate-700 text-sm">תרגיל {currentExIndex + 1} מתוך {exercises.length}</span>
                            <div className="flex gap-1" dir="ltr">
                                {exercises.map((_, i) => (
                                    <div key={i} className={`h-1.5 rounded-full transition-all duration-300 ${i === currentExIndex ? 'w-6 bg-blue-600' : 'w-2 bg-slate-200'}`} />
                                ))}
                            </div>
                        </div>

                        <div className="flex-1 relative overflow-hidden" dir="ltr">
                            <div className="flex h-full transition-transform duration-300 ease-out" style={{ transform: `translateX(-${currentExIndex * 100}%)` }}>
                                {exercises.map((ex, index) => (
                                    <div key={ex.id} className="w-full flex-shrink-0 h-full overflow-y-auto custom-scrollbar" dir="rtl">
                                        <div className="max-w-lg mx-auto p-4 pb-16">
                                            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden block">
                                                <div className="h-56 sm:h-64 relative shrink-0 bg-slate-100">
                                                    <img src={ex.img} alt={ex.name} className="w-full h-full object-cover" />
                                                    <a href={ex.link} target="_blank" rel="noreferrer" className="absolute inset-0 bg-black/20 flex items-center justify-center hover:bg-black/40 transition-colors">
                                                        <PlayCircle className="text-white" size={60} strokeWidth={1.5} />
                                                    </a>
                                                </div>
                                                <div className="p-6">
                                                    {isStrength && ex.targetHe && (
                                                        <div className="mb-3">
                                                            <span className="inline-block bg-indigo-50 text-indigo-700 text-xs font-bold px-3 py-1.5 rounded-lg border border-indigo-100 shadow-sm">
                                                                {ex.targetHe}
                                                            </span>
                                                        </div>
                                                    )}
                                                    <h3 className="text-2xl font-black text-slate-800 mb-2">{ex.name}</h3>
                                                    <p className="text-slate-600 text-base leading-relaxed mb-6">{ex.desc}</p>
                                                    <div className="flex flex-col gap-3">
                                                        <div className="text-blue-700 font-bold bg-blue-50 py-3.5 px-4 rounded-xl text-center border border-blue-200 flex items-center justify-center gap-2 text-lg shadow-sm">
                                                            {ex.duration}
                                                        </div>
                                                        {isStrength && (
                                                            <WeightTrackerComponent 
                                                                exId={ex.id}
                                                                weightLogs={weightLogs}
                                                                onAddLog={handleAddWeightLog}
                                                                onDeleteLog={handleDeleteWeightLog}
                                                            />
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="p-4 bg-white border-t border-slate-200 flex justify-between items-center shrink-0 safe-area-bottom shadow-sm relative z-20">
                            <button onClick={() => setCurrentExIndex(prev => Math.max(0, prev - 1))} disabled={currentExIndex === 0} className="px-5 py-3.5 bg-slate-100 text-slate-600 rounded-2xl disabled:opacity-30 flex items-center gap-2 font-bold active:scale-95 transition-all"><ChevronRight size={20} /> הקודם</button>
                            {currentExIndex < exercises.length - 1 ? (
                                <button onClick={() => setCurrentExIndex(prev => Math.min(exercises.length - 1, prev + 1))} className="px-8 py-3.5 bg-blue-600 text-white rounded-2xl font-bold flex items-center gap-2 shadow-lg shadow-blue-200 active:scale-95 transition-all">הבא <ChevronLeft size={20} /></button>
                            ) : (
                                <button onClick={handleBackToHome} className="px-8 py-3.5 bg-green-500 text-white rounded-2xl font-bold flex items-center gap-2 shadow-lg active:scale-95 transition-all animate-pulse">סיום אימון!</button>
                            )}
                        </div>
                    </div>
                );
            };

            const renderCalendarView = () => {
                const monthInfo = months[currentMonthIndex];
                const daysInMonth = new Date(monthInfo.year, monthInfo.month + 1, 0).getDate();
                const firstDay = new Date(monthInfo.year, monthInfo.month, 1).getDay();
                const daysArray = Array.from({ length: daysInMonth }, (_, i) => i + 1);
                const blanks = Array.from({ length: firstDay }, (_, i) => i);

                return (
                    <div className="animation-fade-in flex flex-col items-center p-4 pb-20">
                        <header className="mb-8 mt-4 text-center">
                            <h1 className="text-3xl font-black text-slate-800 mb-2">מעקב התמדה</h1>
                            <p className="text-slate-500 font-medium">סמן ימי אימון שהושלמו</p>
                        </header>

                        <div className="flex items-center justify-between w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-100 p-2 mb-6">
                            <button onClick={() => setCurrentMonthIndex(Math.min(months.length - 1, currentMonthIndex + 1))} disabled={currentMonthIndex === months.length - 1} className="p-3 text-slate-400 hover:text-blue-600 disabled:opacity-30"><ChevronRight size={24} /></button>
                            <div className="flex flex-col items-center">
                                <span className="text-lg font-black text-slate-800">{monthInfo.name}</span>
                            </div>
                            <button onClick={() => setCurrentMonthIndex(Math.max(0, currentMonthIndex - 1))} disabled={currentMonthIndex === 0} className="p-3 text-slate-400 hover:text-blue-600 disabled:opacity-30"><ChevronLeft size={24} /></button>
                        </div>

                        <div className="bg-white rounded-3xl shadow-sm border border-gray-100 p-4 sm:p-6 w-full max-w-md mx-auto">
                            <div className="grid grid-cols-7 gap-2 mb-4 text-center text-slate-400 font-bold text-sm">
                                {['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'].map(day => <div key={day}>{day}</div>)}
                            </div>
                            <div className="grid grid-cols-7 gap-2 sm:gap-3">
                                {blanks.map(blank => <div key={`blank-${blank}`} className="p-2"></div>)}
                                {daysArray.map(day => {
                                    const dateStr = `${monthInfo.year}-${String(monthInfo.month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                    const isCompleted = trackerState[dateStr];
                                    return (
                                        <button key={dateStr} onClick={() => toggleDay(dateStr)} className={`aspect-square rounded-xl flex items-center justify-center font-bold text-base transition-all ${isCompleted ? 'bg-blue-600 text-white shadow-md scale-105' : 'bg-slate-50 text-slate-600 border border-slate-100'}`}>{day}</button>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900" dir="rtl">
                    {showMomDashboard && (
                        <MomDashboard 
                            trackerState={trackerState} 
                            weightLogs={weightLogs} 
                            onClose={() => setShowMomDashboard(false)} 
                            routines={workoutPlan.strength.routines}
                        />
                    )}

                    <nav className="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50 h-16">
                        <div className="max-w-lg mx-auto px-4 h-full flex items-center justify-between">
                            {/* לוגו כפתור משודרג לזיהוי קליקים מכל מסך */}
                            <button 
                                onClick={handleLogoClick} 
                                className="flex items-center gap-2 cursor-pointer select-none active:scale-95 transition-transform focus:outline-none"
                            >
                                <div className="bg-blue-600 text-white p-1.5 rounded-lg pointer-events-none"><Activity size={22} /></div>
                                <span className="font-black text-xl tracking-tight text-slate-800 pointer-events-none">Fit<span className="text-blue-600">2026</span></span>
                            </button>

                            {currentView !== 'home' && (
                                <button 
                                    onClick={handleBackToHome} 
                                    className="flex items-center gap-1 text-blue-600 font-bold hover:bg-blue-50 py-1.5 px-3 rounded-xl transition-colors"
                                >
                                    <ArrowRight size={18} strokeWidth={2.5} />
                                    <span className="text-sm">חזור לתפריט</span>
                                </button>
                            )}
                        </div>
                    </nav>

                    <main className="max-w-lg mx-auto relative h-[calc(100vh-4rem)]">
                        {currentView === 'home' && renderHomeMenu()}
                        {(currentView === 'cardio' || currentView === 'strength' || currentView === 'stretching') && renderExerciseSlider()}
                        {currentView === 'tracker' && renderCalendarView()}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
