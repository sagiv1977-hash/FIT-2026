    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body, html {
            overscroll-behavior-y: none;

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

<body class="bg-slate-50 font-sans text-slate-900 m-0 p-0 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const Icon = ({ name, size = 24, color = 'currentColor', strokeWidth = 2, className = '' }) => {
            const elRef = React.useRef(null);
            React.useEffect(() => {
                if (elRef.current && lucide.icons[name]) {
                    const icon = lucide.icons[name];
                    const svgElement = lucide.createElement(icon);
                    svgElement.setAttribute('width', size);
                    svgElement.setAttribute('height', size);
                    svgElement.setAttribute('stroke', color);
                    svgElement.setAttribute('stroke-width', strokeWidth);
                    if (className) svgElement.setAttribute('class', className);
                    
                    elRef.current.innerHTML = '';
                    elRef.current.appendChild(svgElement);
                }
            }, [name, size, color, strokeWidth, className]);
            
            return <span ref={elRef} className="inline-flex items-center justify-center"></span>;
        };

        const Calendar = (props) => <Icon name="Calendar" {...props} />;
        const Dumbbell = (props) => <Icon name="Dumbbell" {...props} />;
        const Activity = (props) => <Icon name="Activity" {...props} />;
        const StretchHorizontal = (props) => <Icon name="StretchHorizontal" {...props} />;
        const ExternalLink = (props) => <Icon name="ExternalLink" {...props} />;
        const PlayCircle = (props) => <Icon name="PlayCircle" {...props} />;
        const ChevronRight = (props) => <Icon name="ChevronRight" {...props} />;
        const ChevronLeft = (props) => <Icon name="ChevronLeft" {...props} />;
        const ArrowRight = (props) => <Icon name="ArrowRight" {...props} />;
        const Plus = (props) => <Icon name="Plus" {...props} />;
        const HistoryIcon = (props) => <Icon name="History" {...props} />;
        const Target = (props) => <Icon name="Target" {...props} />;
        const AlertTriangle = (props) => <Icon name="AlertTriangle" {...props} />;

        // מודול מעקב משקלים חכם - עכשיו גלוי תמיד!
        const WeightTrackerComponent = ({ exId, weightLogs, onAddLog }) => {
            const [dateInput, setDateInput] = useState(new Date().toISOString().split('T')[0]);
            const [weightInput, setWeightInput] = useState('');
            const logs = weightLogs[exId] || [];

            const handleAdd = () => {
                if (!weightInput) return;
                onAddLog(exId, dateInput, weightInput);
                setWeightInput('');
            };

            return (
                <div className="mt-2 bg-slate-50 border border-slate-200 rounded-xl p-4 shadow-sm">
                    <h4 className="font-bold text-slate-700 text-sm mb-3 flex items-center gap-2">
                        <HistoryIcon size={16} /> מעקב משקלים אישי
                    </h4>
                    
                    <div className="flex gap-2 mb-4">
                        <input 
                            type="date" 
                            value={dateInput}
                            onChange={(e) => setDateInput(e.target.value)}
                            className="flex-1 px-3 py-2 text-sm rounded-lg border border-slate-300 focus:outline-none focus:border-blue-500 bg-white"
                        />
                        <input 
                            type="number" 
                            step="0.5"
                            placeholder="ק״ג" 
                            value={weightInput}
                            onChange={(e) => setWeightInput(e.target.value)}
                            className="w-20 px-3 py-2 text-sm rounded-lg border border-slate-300 focus:outline-none focus:border-blue-500 bg-white text-center"
                            dir="ltr"
                        />
                        <button 
                            type="button"
                            onClick={handleAdd}
                            className="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg flex items-center justify-center transition-colors shrink-0 shadow-sm"
                        >
                            <Plus size={18} />
                        </button>
                    </div>

                    {logs.length > 0 ? (
                        <>
                            <div className="max-h-24 overflow-y-auto pr-1 custom-scrollbar mb-4">
                                <table className="w-full text-sm text-right">
                                    <thead className="text-slate-500 sticky top-0 bg-slate-50">
                                        <tr>
                                            <th className="py-1 font-medium border-b border-slate-200">תאריך</th>
                                            <th className="py-1 font-medium border-b border-slate-200">משקל</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {logs.map((log, i) => (
                                            <tr key={i} className="border-b border-slate-100 last:border-0">
                                                <td className="py-2 text-slate-700">{new Date(log.date).toLocaleDateString('he-IL')}</td>
                                                <td className="py-2 font-bold text-blue-600" dir="ltr">{log.weight} kg</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            
                            {(() => {
                                const latestLog = logs[0];
                                if (!latestLog || isNaN(latestLog.weight)) return null;
                                
                                const nextDate = new Date(new Date(latestLog.date).getTime() + 21 * 24 * 60 * 60 * 1000);
                                const nextWeight = (latestLog.weight + 1.25).toFixed(2);
                                
                                return (
                                    <div className="bg-orange-50 border border-orange-200 rounded-xl p-3 mt-2">
                                        <div className="flex items-center gap-2 text-orange-800 font-black mb-1 text-sm">
                                            <Target size={16} /> יעד לאימון הבא:
                                        </div>
                                        <div className="text-orange-900 font-bold text-lg mb-2 flex items-center gap-2">
                                            <span>{nextDate.toLocaleDateString('he-IL')}</span>
                                            <span className="text-orange-300">|</span>
                                            <span dir="ltr">{parseFloat(nextWeight)} kg</span>
                                            <span className="text-[10px] text-orange-600 bg-orange-100 px-1.5 py-0.5 rounded-full">+1.25kg</span>
                                        </div>

                                        </div>
                                    </div>
                                );
                            })()}

                                { id: "s2_12", targetHe: "בטן", targetEn: "Core", name: "אופניים (Bicycle Crunches)", desc: "קירוב מרפק לברך נגדית בשכיבה.", duration: "3 סטים | 20 חזרות", img: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=bicycle+crunches" }
                            ]
                        }
                    ]
                },
                stretching: {
                    id: 'stretching',
                    title: "מתיחות (10 דקות)",
                    icon: <StretchHorizontal className="w-6 h-6 text-green-500" />,
                    exercises: [
                        { id: "st1", name: "1. מתיחת חזה במשקוף", desc: "הנחת אמות על משקוף דלת והישענות קלה קדימה.", duration: "30 שניות", img: "https://images.unsplash.com/photo-1552674605-db6ffd4facb5?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=doorway+chest+stretch" },
                        { id: "st2", name: "2. מתיחת כתף בהצלבה", desc: "העברת יד ישרה מעבר לחזה ומשיכתה פנימה.", duration: "30 שנ' לצד", img: "https://images.unsplash.com/photo-1599058917212-d750089bc07e?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=cross+body+shoulder+stretch" },
                        { id: "st3", name: "3. מתיחת תלת ראשי מעל הראש", desc: "כפיפת מרפק אל מאחורי העורף ומשיכה עם יד שניה.", duration: "30 שנ' לצד", img: "https://images.unsplash.com/photo-1518611012118-696072aa579a?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=overhead+triceps+stretch" },
                        { id: "st4", name: "4. מתיחת צוואר עדינה", desc: "הטיית הראש הצידה אל כיוון הכתף, כתפיים למטה.", duration: "20 שנ' לצד", img: "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=gentle+neck+stretch" },
                        { id: "st5", name: "5. תנוחת העובר", desc: "ישיבה על העקבים, ידיים קדימה והורדת הראש.", duration: "45 שניות", img: "https://images.unsplash.com/photo-1506126613408-eca07ce68773?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=childs+pose+stretch" },
                        { id: "st6", name: "6. מתיחת ארבע ראשי עמידה", desc: "תפיסת קרסול ומשיכת העקב לישבן (להחזיק קיר לאיזון).", duration: "30 שנ' לצד", img: "https://images.unsplash.com/photo-1588286840104-b43b67e0e7a2?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=standing+quad+stretch" },
                        { id: "st7", name: "7. מתיחת המסטרינג ישיבה", desc: "ישיבה, רגל ישרה ורגל כפופה, רכינה לפנים לאצבעות.", duration: "30 שנ' לרגל", img: "https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=seated+hamstring+stretch" },
                        { id: "st8", name: "8. מתיחת שוקיים על קיר", desc: "ידיים על קיר, רגל לאחור ישרה עקב צמוד לרצפה.", duration: "30 שנ' לצד", img: "https://images.unsplash.com/photo-1574680096145-d05b474e2155?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=wall+calf+stretch" },
                        { id: "st9", name: "9. מתיחת ישבן צורת 4", desc: "שכיבה, קרסול ימין על ברך שמאל, משיכת ירך לחזה.", duration: "30 שנ' לצד", img: "https://images.unsplash.com/photo-1517130038641-a774d04afb3c?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=figure+4+stretch" },
                        { id: "st10", name: "10. מתיחת כופפי ירך בכריעה", desc: "ברך על הרצפה, רגל שניה ב-90 מעלות, דחיפת אגן קדימה.", duration: "30 שנ' לצד", img: "https://images.unsplash.com/photo-1574680088814-c9e8a10d8a4d?auto=format&fit=crop&w=600&q=80", link: "https://www.youtube.com/results?search_query=kneeling+hip+flexor+stretch" }
                    ]
                }
            };

            const startWorkout = (view) => {
                setCurrentExIndex(0);
                setCurrentView(view);
            };

            const handleBackToHome = () => {
                setCurrentView('home');
                setCurrentExIndex(0);
            };

            const toggleDay = (dateStr) => {
                setTrackerState(prev => ({ ...prev, [dateStr]: !prev[dateStr] }));
            };

            const handleAddWeightLog = (exId, date, weight) => {
                if (!weight) return;
                setWeightLogs(prev => {
                    const currentLogs = prev[exId] || [];
                    const newLogs = [...currentLogs, { date, weight: parseFloat(weight) }];
                    newLogs.sort((a, b) => new Date(b.date) - new Date(a.date));
                    return { ...prev, [exId]: newLogs };
                });
            };

            const renderHomeMenu = () => (
                <div className="max-w-md mx-auto p-4 space-y-4 animation-fade-in pb-20">
                    <header className="mb-6 mt-2 text-center">
                        <h1 className="text-3xl font-black text-slate-800 mb-1">אימון 2026</h1>
                        <p className="text-slate-500 font-medium">בחר את החלק שתרצה לבצע כעת</p>
                    </header>

                    <button type="button" onClick={() => startWorkout('cardio')} className="w-full bg-white p-5 rounded-3xl shadow-sm border border-slate-100 hover:border-blue-300 hover:shadow-md transition-all flex items-center gap-4 text-right">
                        <div className="bg-blue-50 p-4 rounded-2xl text-blue-500"><Activity size={32}/></div>
                        <div className="flex-1">
                            <h2 className="text-lg font-bold text-slate-800">אירובי</h2>
                            <p className="text-sm text-slate-500">20 דק' • 3 שלבים בלבד</p>
                        </div>
                        <ChevronLeft className="text-slate-300" />
                    </button>

                    <div className="w-full bg-white p-5 rounded-3xl shadow-sm border border-slate-100 hover:border-orange-300 hover:shadow-md transition-all flex flex-col gap-4">
                        <div className="flex items-center gap-4 cursor-pointer" onClick={() => startWorkout('strength')}>
                            <div className="bg-orange-50 p-4 rounded-2xl text-orange-500"><Dumbbell size={32}/></div>
                            <div className="flex-1 text-right">
                                <h2 className="text-lg font-bold text-slate-800">אימון כוח</h2>
                                <p className="text-sm text-slate-500">40 דק' • סבבי תחתון ➡️ עליון ➡️ בטן</p>
                            </div>
                            <ChevronLeft className="text-slate-300" />
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-xl w-full">
                            {workoutPlan.strength.routines.map((r, idx) => (
                                <button type="button" key={idx} onClick={(e) => { e.stopPropagation(); setActiveRoutineIndex(idx); }} className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition-all ${activeRoutineIndex === idx ? 'bg-white text-orange-600 shadow-sm' : 'text-slate-500'}`}>
                                    {r.name.split(' ')[0]} {r.name.split(' ')[1]}
                                </button>
                            ))}
                        </div>
                        <button type="button" onClick={() => startWorkout('strength')} className="w-full bg-orange-100 text-orange-700 font-bold py-3 rounded-xl hover:bg-orange-200 transition-colors">
                            התחל אימון כוח
                        </button>
                    </div>

                    <button type="button" onClick={() => startWorkout('stretching')} className="w-full bg-white p-5 rounded-3xl shadow-sm border border-slate-100 hover:border-green-300 hover:shadow-md transition-all flex items-center gap-4 text-right">
                        <div className="bg-green-50 p-4 rounded-2xl text-green-500"><StretchHorizontal size={32}/></div>
                        <div className="flex-1">
                            <h2 className="text-lg font-bold text-slate-800">מתיחות</h2>
                            <p className="text-sm text-slate-500">10 דק' • שחרור וגמישות</p>
                        </div>
                        <ChevronLeft className="text-slate-300" />
                    </button>

                    <button type="button" onClick={() => setCurrentView('tracker')} className="w-full bg-slate-800 p-5 rounded-3xl shadow-md border border-slate-700 hover:bg-slate-700 transition-all flex items-center gap-4 text-right text-white mt-8">
                        <div className="bg-slate-700 p-4 rounded-2xl text-purple-400"><Calendar size={32}/></div>
                        <div className="flex-1">
                            <h2 className="text-lg font-bold">מעקב התמדה</h2>
                            <p className="text-sm text-slate-400">יומן חודשי אישי</p>
                        </div>
                        <ChevronLeft className="text-slate-500" />
                    </button>
                </div>
            );

            const renderExerciseSlider = () => {
                let exercises = [];
                let isStrength = false;

                if (currentView === 'cardio') exercises = workoutPlan.cardio.exercises;
                if (currentView === 'stretching') exercises = workoutPlan.stretching.exercises;
                if (currentView === 'strength') {
                    exercises = workoutPlan.strength.routines[activeRoutineIndex].exercises;
                    isStrength = true;
                }

                return (
                    <div className="flex flex-col h-[calc(100vh-4rem)] bg-slate-50 overflow-hidden animation-fade-in">
                        <div className="px-4 py-3 bg-white border-b border-slate-200 flex justify-between items-center z-10 shrink-0 shadow-sm">
                            <span className="font-bold text-slate-700 text-sm">תרגיל {currentExIndex + 1} מתוך {exercises.length}</span>
                            <div className="flex gap-1" dir="ltr">
                                {exercises.map((_, i) => (
                                    <div key={i} className={`h-1.5 rounded-full transition-all duration-300 ${i === currentExIndex ? 'w-6 bg-blue-600' : 'w-2 bg-slate-200'}`} />
                                ))}
                            </div>
                        </div>

                        <div className="flex-1 relative overflow-hidden" dir="ltr">
                            <div 
                                className="flex h-full transition-transform duration-300 ease-out"
                                style={{ transform: `translateX(-${currentExIndex * 100}%)` }} 
                            >
                                {exercises.map((ex, index) => (
                                    <div key={ex.id} className="w-full flex-shrink-0 h-full overflow-y-auto hide-scroll pb-6" dir="rtl">
                                        <div className="max-w-lg mx-auto p-4 h-full flex flex-col">
                                            <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden flex flex-col min-h-full">
                                                
                                                <div className="h-56 sm:h-64 relative shrink-0 bg-slate-100">
                                                    <img src={ex.img} alt={ex.name} className="w-full h-full object-cover" />
                                                    <a href={ex.link} target="_blank" rel="noreferrer" className="absolute inset-0 bg-black/20 flex items-center justify-center hover:bg-black/40 transition-colors">
                                                        <PlayCircle className="text-white" size={60} strokeWidth={1.5} />
                                                    </a>
                                                </div>
                                                
                                                <div className="p-6 flex-1 flex flex-col">
                                                    {isStrength && ex.targetHe && (
                                                        <div className="mb-3">
                                                            <span className="inline-block bg-indigo-50 text-indigo-700 text-xs font-bold px-3 py-1.5 rounded-lg border border-indigo-100">
                                                                שריר: {ex.targetHe} | <span className="font-sans" dir="ltr">{ex.targetEn}</span>
                                                            </span>
                                                        </div>
                                                    )}
                                                    
                                                    <h3 className="text-2xl font-black text-slate-800 mb-2">{ex.name}</h3>
                                                    <p className="text-slate-600 text-base leading-relaxed mb-6">{ex.desc}</p>
                                                    
                                                    <div className="mt-auto">
                                                        <div className="text-blue-700 font-bold bg-blue-50 py-3 px-4 rounded-xl text-center border border-blue-100 flex items-center justify-center gap-2 text-lg">
                                                            {ex.duration}
                                                        </div>
                                                        
                                                        {isStrength && (
                                                            <div className="mt-6 border-t border-slate-100 pt-2">
                                                                {/* הרכיב מוצג תמיד באימון כוח! */}
                                                                <WeightTrackerComponent 
                                                                    exId={ex.id}
                                                                    weightLogs={weightLogs}
                                                                    onAddLog={handleAddWeightLog}
                                                                />
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>

                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="p-4 bg-white border-t border-slate-200 flex justify-between items-center shrink-0 safe-area-bottom">
                            <button 
                                type="button"
                                onClick={() => setCurrentExIndex(prev => Math.max(0, prev - 1))}
                                disabled={currentExIndex === 0}
                                className="px-5 py-3.5 bg-slate-100 text-slate-600 rounded-2xl disabled:opacity-30 flex items-center gap-2 font-bold transition-all active:scale-95"
                            >
                                <ChevronRight size={20} /> הקודם
                            </button>
                            
                            {currentExIndex < exercises.length - 1 ? (
                                <button 
                                    type="button"
                                    onClick={() => setCurrentExIndex(prev => Math.min(exercises.length - 1, prev + 1))}
                                    className="px-8 py-3.5 bg-blue-600 text-white rounded-2xl font-bold flex items-center gap-2 shadow-lg shadow-blue-200 transition-all active:scale-95"
                                >
                                    הבא <ChevronLeft size={20} />
                                </button>
                            ) : (
                                <button 
                                    type="button"
                                    onClick={handleBackToHome}
                                    className="px-8 py-3.5 bg-green-500 text-white rounded-2xl font-bold flex items-center gap-2 shadow-lg shadow-green-200 transition-all active:scale-95 animate-pulse"
                                >
                                    סיום אימון! <Activity size={20} />
                                </button>
                            )}
                        </div>
                    </div>
                );
            };

            const renderCalendarView = () => {
                const monthInfo = months[currentMonthIndex];
                const daysInMonth = new Date(monthInfo.year, monthInfo.month + 1, 0).getDate();
                const firstDay = new Date(monthInfo.year, monthInfo.month, 1).getDay();
                const daysArray = Array.from({ length: daysInMonth }, (_, i) => i + 1);
                const blanks = Array.from({ length: firstDay }, (_, i) => i);
                const weekDays = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ש'];

                return (
                    <div className="animation-fade-in flex flex-col items-center p-4 pb-20">
                        <header className="mb-8 mt-4 text-center">
                            <h1 className="text-3xl font-black text-slate-800 mb-2">מעקב התמדה אישי</h1>
                            <p className="text-slate-500 font-medium max-w-md mx-auto">לחץ על כל יום שבו השלמת אימון.</p>
                        </header>

                        <div className="flex items-center justify-between w-full max-w-md bg-white rounded-2xl shadow-sm border border-gray-100 p-2 mb-6">
                            <button type="button" onClick={() => setCurrentMonthIndex(Math.min(months.length - 1, currentMonthIndex + 1))} disabled={currentMonthIndex === months.length - 1} className="p-3 text-slate-400 hover:text-blue-600 disabled:opacity-30"><ChevronRight size={24} /></button>
                            <div className="flex flex-col items-center">
                                <span className="text-xs font-bold tracking-widest text-blue-500 uppercase">חודש {currentMonthIndex + 1} מתוך 6</span>
                                <span className="text-lg font-black text-slate-800">{monthInfo.name}</span>
                            </div>
                            <button type="button" onClick={() => setCurrentMonthIndex(Math.max(0, currentMonthIndex - 1))} disabled={currentMonthIndex === 0} className="p-3 text-slate-400 hover:text-blue-600 disabled:opacity-30"><ChevronLeft size={24} /></button>
                        </div>

                        <div className="bg-white rounded-3xl shadow-sm border border-gray-100 p-4 sm:p-6 w-full max-w-md mx-auto">
                            <div className="grid grid-cols-7 gap-2 mb-4 text-center text-slate-400 font-bold text-sm">
                                {weekDays.map(day => <div key={day}>{day}</div>)}
                            </div>
                            <div className="grid grid-cols-7 gap-2 sm:gap-3">
                                {blanks.map(blank => <div key={`blank-${blank}`} className="p-2"></div>)}
                                {daysArray.map(day => {
                                    const dateStr = `${monthInfo.year}-${String(monthInfo.month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                                    const isCompleted = trackerState[dateStr];
                                    return (
                                        <button
                                            type="button"
                                            key={dateStr}
                                            onClick={() => toggleDay(dateStr)}
                                            className={`aspect-square rounded-xl flex items-center justify-center font-bold text-base transition-all duration-200 ${isCompleted ? 'bg-blue-600 text-white shadow-md shadow-blue-200 scale-105' : 'bg-slate-50 text-slate-600 hover:bg-slate-100 border border-slate-100'}`}
                                        >
                                            {day}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900" dir="rtl">
                    <nav className="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50 h-16">
                        <div className="max-w-lg mx-auto px-4 h-full flex items-center">
                            {currentView !== 'home' ? (
                                <button 
                                    type="button"
                                    onClick={handleBackToHome} 
                                    className="flex items-center gap-2 text-blue-600 font-bold hover:bg-blue-50 py-2 px-3 rounded-xl transition-colors -mr-3"
                                >
                                    <ArrowRight size={22} strokeWidth={2.5} />
                                    <span>חזור לתפריט</span>
                                </button>
                            ) : (
                                <div className="flex items-center gap-2">
                                    <div className="bg-blue-600 text-white p-1.5 rounded-lg"><Activity size={22} /></div>
                                    <span className="font-black text-xl tracking-tight text-slate-800">Fit<span className="text-blue-600">2026</span></span>
                                </div>
                            )}
                        </div>
                    </nav>

                    <main className="max-w-lg mx-auto relative">
                        {currentView === 'home' && renderHomeMenu()}
                        {(currentView === 'cardio' || currentView === 'strength' || currentView === 'stretching') && renderExerciseSlider()}
                        {currentView === 'tracker' && renderCalendarView()}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
